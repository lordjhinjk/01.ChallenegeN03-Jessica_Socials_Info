<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link href="styles.css" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz@1,18..144&family=Oswald:wght@200..700&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet">
  <title>Frontend Mentor | Social links profile</title>
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <main>
    <div class="card">
      <figure class="image-container">
        <img class="img" src="./assets/images/avatar-jessica.jpeg"
          alt="Design preview for the Social links profile coding challenge">
        <figcaption>
          <h1 class="jess">Jessica Randall</h1>
        </figcaption>
        <address class="location">London, United Kingdom</address>
      </figure>
      <span class="description">"Front-end developer and avid reader"</span>
      <div class="platforms">
        <a href="#" class="link">
          <h3 class="socials">GitHub</h3>
        </a>
        <a href="#" class="link">
          <h3 class="socials">Frontend Mentor</h3>
        </a>
        <a href="#" class="link">
          <h3 class="socials">LinkedIn</h3>
        </a>
        <a href="#" class="link">
          <h3 class="socials">Twiter</h3>
        </a>
        <a href="#" class="link">
          <h3 class="socials">Instagram</h3>
        </a>
      </div>
    </div>
  </main>


  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Ismail</a>.
  </footer>
</body>

</html>
